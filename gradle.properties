# 设置 gradle 命令使用的默认内存。可被用户或命令行属性覆盖。
# 这是为 Minecraft 反编译过程提供足够内存所必需的。
org.gradle.jvmargs=-Xmx3G
org.gradle.daemon=false


## Environment Properties

# Minecraft 版本必须与 Forge 版本一致才能获得有效的 artifact
minecraft_version=1.20.1
# Minecraft 版本范围可以使用任何发布版本的 Minecraft 作为边界。
# 快照版本、预发布版本和候选发布版本不保证正确排序，
# 因为它们不遵循标准的版本命名约定。
minecraft_version_range=[1.20.1]
# Forge 版本必须与 Minecraft 版本一致才能获得有效的 artifact
forge_version=47.4.10
# Forge 版本范围可以使用任何版本的 Forge 作为边界，或匹配 loader 版本范围
forge_version_range=[47,)
# loader 版本范围只能使用 Forge/FML 的主版本号作为边界
loader_version_range=[47,)
# 用于映射的映射渠道。
# 默认支持的映射渠道集合为 ["official", "snapshot", "snapshot_nodoc", "stable", "stable_nodoc"]。
# 可以通过 Gradle 插件中的 "channelProviders" 扩展注册额外的映射渠道。
#
# | 渠道      | 版本                 |                                                                     |
# |-----------|----------------------|---------------------------------------------------------------------|
# | official  | MCVersion            | 来自 Mojang 映射文件的官方字段/方法名称                               |
# | parchment | YYYY.MM.DD-MCVersion | 基于 official 之上的开源社区参数名称和 javadoc                      |
#
# 使用 'official' 或 'parchment' 映射时，你必须了解 Mojang 的许可协议。
# 更多信息参见: https://github.com/MinecraftForge/MCPConfig/blob/master/Mojang.md
#
# Parchment 是由 ParchmentMC 维护的非官方项目，与 Minecraft Forge 无关。
# 使用他们的映射需要额外配置，参见 https://parchmentmc.org/docs/getting-started
mapping_channel=official
# 从映射渠道查询的映射版本。
# 这必须符合映射渠道要求的格式。
mapping_version=1.20.1


## Mod Properties

# mod 的唯一标识符。必须在英文语言环境下使用小写字母。必须符合正则表达式 [a-z][a-z0-9_]{1,63}
# 必须与主 mod 类中带有 @Mod 注解的 String 常量匹配。
mod_id=pasterdream
# mod 的人类可读显示名称。
mod_name=Paster Dream
# mod 的许可证。在 https://choosealicense.com/ 查看你的选项。默认为 All Rights Reserved。
mod_license=All Rights Reserved
# mod 版本。参见 https://semver.org/
mod_version=0.0.1-1.20.1
# mod 的 group ID。仅在作为 artifact 发布到 Maven 仓库时重要。
# 这应与 mod 源代码使用的基础包名匹配。
# 参见 https://maven.apache.org/guides/mini/guide-naming-conventions.html
mod_group_id=com.pasterdream.pasterdreammod
# mod 的作者。这是一个简单的文本字符串，用于在 mod 列表中显示。
mod_authors=YourNameHere, OtherNameHere
# mod 的描述。这是一个简单的多行文本字符串，用于在 mod 列表中显示。
mod_description=Example mod description.\nNewline characters can be used and will be replaced properly.
# JEI 版本
jei_version=15.20.0.112